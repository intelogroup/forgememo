<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Sign in to Forgemem</title></head>
<body style="font-family:sans-serif;max-width:400px;margin:80px auto">
  <h2>Sign in to Forgemem</h2>
  <p>Enter your email to receive a magic link.</p>
  <!-- nosemgrep: django.templates.security.csrf-not-used -->
  <!-- CSRF note: this is Jinja2/FastAPI, not Django. `state` is a
       cryptographically random token generated by the CLI (secrets.token_urlsafe)
       and validated on the callback — it functions as the CSRF token (OAuth pattern). -->
  <form method="post" action="/cli-auth/send-link">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="callback" value="{{ callback }}">
    <input type="hidden" name="state" value="{{ state }}">
    <input type="email" name="email" placeholder="you@example.com" required
           style="width:100%;padding:8px;margin-bottom:8px">
    <button type="submit"
            style="width:100%;padding:8px;background:#0070f3;color:white;border:none;cursor:pointer">
      Send magic link
    </button>
  </form>
  <p style="font-size:12px;color:#666">
    First login? You'll get $5 free credits. No card required.
  </p>
</body>
</html>
