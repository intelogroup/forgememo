<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Signing in to Forgemem…</title></head>
<body style="font-family:sans-serif;max-width:400px;margin:80px auto">
  <h2>Signing in…</h2>
  <p id="status">Verifying your magic link.</p>
  <script>
    (function () {
      // Supabase puts access_token in the URL fragment after magic-link verify.
      var hash = window.location.hash.substring(1);
      var params = {};
      hash.split('&').forEach(function(p) {
        var kv = p.split('=');
        params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
      });

      var token = params['access_token'];
      if (!token) {
        document.getElementById('status').textContent =
          'No token found. Please try signing in again.';
        return;
      }

      // POST token to exchange endpoint (fragment is not sent to server)
      var search = window.location.search;
      fetch('/cli-auth/exchange' + search, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({access_token: token})
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.redirect) {
          window.location.href = data.redirect;
          document.getElementById('status').textContent =
            'Done! You can close this tab and return to your terminal.';
        } else {
          document.getElementById('status').textContent =
            'Error: ' + (data.detail || 'Unknown error');
        }
      })
      .catch(function() {
        document.getElementById('status').textContent =
          'Network error. Please try again.';
      });
    })();
  </script>
</body>
</html>
